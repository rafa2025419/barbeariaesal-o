<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Divine Studio - Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;500;600&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        /* Mesmos estilos da versão anterior (tons de salmão) */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --salmão-principal: #FF8C69;
            --salmão-claro: #FFA07A;
            --salmão-escuro: #E67352;
            --salmão-suave: #FFD9CC;
            --salmão-fundo: #FFF8F6;
            --dourado: #D4A16A;
            --texto-escuro: #665;
            --texto-claro: #AA8;
            --branco: #FFFFFF;
            --sombra: rgba(255, 140, 105, 0.15);
        }

        body {
            font-family: 'Raleway', sans-serif;
            background: linear-gradient(135deg, var(--salmão-fundo) 0%, #FFEFEB 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--texto-escuro);
            overflow-x: hidden;
        }

        /* Elementos decorativos */
        .decorative-bg {
            position: absolute;
            z-index: 0;
            opacity: 0.08;
            color: var(--salmão-principal);
        }

        .decor-1 {
            top: 10%;
            left: 5%;
            font-size: 4rem;
            transform: rotate(15deg);
        }

        .decor-2 {
            bottom: 10%;
            right: 5%;
            font-size: 5rem;
            transform: rotate(-20deg);
        }

        .login-container {
            width: 90%;
            max-width: 420px;
            background-color: var(--branco);
            border-radius: 25px;
            box-shadow: 0 15px 35px var(--sombra);
            padding: 40px 30px;
            position: relative;
            z-index: 1;
            border: 1px solid var(--salmão-suave);
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            font-family: 'Great Vibes', cursive;
            font-size: 3.2rem;
            background: linear-gradient(to right, var(--salmão-principal), var(--salmão-claro));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-align: center;
            margin-bottom: 5px;
        }

        .slogan {
            font-family: 'Playfair Display', serif;
            color: var(--dourado);
            text-align: center;
            font-size: 1rem;
            letter-spacing: 2px;
            margin-bottom: 30px;
        }

        /* Seletor de perfil */
        .profile-selector {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }

        .profile-option {
            flex: 1;
            text-align: center;
            padding: 15px;
            border: 2px solid var(--salmão-suave);
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s;
            background: var(--salmão-fundo);
        }

        .profile-option.active {
            background: linear-gradient(135deg, #FFE9E0, #FFD9CC);
            border-color: var(--salmão-principal);
        }

        .profile-option i {
            font-size: 2rem;
            color: var(--salmão-principal);
            margin-bottom: 10px;
        }

        .profile-option span {
            display: block;
            font-weight: 500;
        }

        /* Formulário de login */
        .form-group {
            margin-bottom: 25px;
            position: relative;
        }

        .form-group i {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--salmão-principal);
            font-size: 1.1rem;
        }

        .form-control {
            width: 100%;
            padding: 18px 20px 18px 50px;
            border: 1px solid var(--salmão-suave);
            border-radius: 15px;
            font-size: 1rem;
            font-family: 'Raleway', sans-serif;
            background: var(--salmão-fundo);
            transition: all 0.3s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--salmão-principal);
            box-shadow: 0 0 0 3px rgba(255, 140, 105, 0.15);
            background: var(--branco);
        }

        .btn {
            width: 100%;
            padding: 18px;
            border-radius: 15px;
            border: none;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Raleway', sans-serif;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--salmão-principal), var(--salmão-claro));
            color: var(--branco);
            margin-top: 15px;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(255, 140, 105, 0.3);
        }

        .links {
            display: flex;
            justify-content: space-between;
            margin-top: 25px;
            font-size: 0.9rem;
        }

        .link {
            color: var(--salmão-escuro);
            text-decoration: none;
            transition: color 0.3s;
            cursor: pointer;
        }

        .link:hover {
            color: var(--salmão-principal);
            text-decoration: underline;
        }

        /* Responsividade */
        @media (max-width: 480px) {
            .login-container {
                padding: 30px 20px;
            }
            
            .logo {
                font-size: 2.8rem;
            }
            
            .profile-selector {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <!-- Elementos decorativos -->
    <div class="decorative-bg decor-1">
        <i class="fas fa-feather-alt"></i>
    </div>
    <div class="decorative-bg decor-2">
        <i class="fas fa-spa"></i>
    </div>

    <div class="login-container">
        <div class="logo">Divine Studio</div>
        <div class="slogan">Beleza & Elegância</div>

        <!-- Seletor de perfil -->
        <div class="profile-selector">
            <div class="profile-option active" id="option-client" onclick="selectProfile('client')">
                <i class="fas fa-user-circle"></i>
                <span>Cliente</span>
            </div>
            <div class="profile-option" id="option-stylist" onclick="selectProfile('stylist')">
                <i class="fas fa-cut"></i>
                <span>Cabeleireiro</span>
            </div>
        </div>

        <!-- Formulário de login -->
        <form id="loginForm">
            <div class="form-group">
                <i class="fas fa-envelope"></i>
                <input type="email" class="form-control" id="email" placeholder="E-mail" required>
            </div>
            <div class="form-group">
                <i class="fas fa-lock"></i>
                <input type="password" class="form-control" id="password" placeholder="Senha" required>
            </div>
            <button type="submit" class="btn btn-primary" id="loginBtn">Entrar</button>
        </form>

        <!-- Links -->
        <div class="links">
<a href="#" class="link" onclick="alert('Por favor, entre em contato com o salão para recuperar sua senha.'); return false;">Esqueci minha senha</a>
            <a href="cadastro.html" class="link" id="registerLink">Cadastre-se</a>
        </div>
    </div>

    <script>
        // Estado do perfil selecionado
        let selectedProfile = 'client'; // 'client' ou 'stylist'

        function selectProfile(profile) {
            selectedProfile = profile;
            // Atualizar visual
            document.getElementById('option-client').classList.remove('active');
            document.getElementById('option-stylist').classList.remove('active');
            document.getElementById(`option-${profile}`).classList.add('active');
        }

        // Lidar com o envio do formulário
        document.getElementById('loginForm').addEventListener('submit', function(event) {
            event.preventDefault(); // Evita recarregar a página

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();

            // Validação simples
            if (!email || !password) {
                alert('Por favor, preencha todos os campos.');
                return;
            }

            // Simulação de login - Aqui você pode integrar com uma API real
            // Por enquanto, redireciona baseado no perfil selecionado
            if (selectedProfile === 'client') {
                // Redirecionar para a página do cliente
                window.location.href = 'cliente.html';
            } else {
                // Redirecionar para a página do cabeleireiro
                window.location.href = 'profissional.html';
            }
        });

        // O link "Cadastre-se" já tem href="cadastro.html" no HTML, então nenhum JS extra é necessário.
    </script>
</body>
</html>
