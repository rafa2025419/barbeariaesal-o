<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agenda do Cabeleireiro - Cadastro</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    h1 {
      color: #fff;
      margin-bottom: 30px;
      font-size: 2.5em;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
      text-align: center;
      font-weight: 600;
    }

    form {
      background: white;
      max-width: 700px;
      width: 100%;
      margin: 0 auto;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(255, 154, 158, 0.3);
      backdrop-filter: blur(10px);
      transition: transform 0.3s ease;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    form:hover {
      transform: translateY(-5px);
      box-shadow: 0 25px 70px rgba(255, 154, 158, 0.4);
    }

    p {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #ff8a8a;
      font-weight: 600;
      font-size: 0.95em;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input, select, textarea {
      width: 100%;
      padding: 14px 18px;
      border: 2px solid #ffd1d1;
      border-radius: 12px;
      font-size: 15px;
      transition: all 0.3s ease;
      background: #fff9f9;
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #ff9a9e;
      background: white;
      box-shadow: 0 5px 15px rgba(255, 154, 158, 0.2);
    }

    input:hover, select:hover, textarea:hover {
      border-color: #fad0c4;
    }

    textarea {
      resize: vertical;
      min-height: 100px;
    }

    /* Grid para data e hora */
    .datetime-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .datetime-grid p {
      margin-bottom: 0;
    }

    /* Estilo para os botões */
    .button-group {
      display: flex;
      gap: 15px;
      margin-top: 30px;
    }

    button {
      flex: 1;
      padding: 16px 24px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.3s ease;
      background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
      color: white;
      box-shadow: 0 10px 20px rgba(255, 154, 158, 0.3);
    }

    button[type="reset"] {
      background: linear-gradient(135deg, #fad0c4 0%, #ff9a9e 100%);
      box-shadow: 0 10px 20px rgba(250, 208, 196, 0.3);
    }

    button:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 30px rgba(255, 154, 158, 0.4);
    }

    button[type="reset"]:hover {
      box-shadow: 0 15px 30px rgba(250, 208, 196, 0.4);
    }

    button:active {
      transform: translateY(-1px);
    }

    /* Placeholder styling */
    ::placeholder {
      color: #ffb6b6;
      opacity: 0.7;
      font-size: 14px;
    }

    /* Estilo para o select */
    select {
      appearance: none;
      background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23ff9a9e' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
      background-repeat: no-repeat;
      background-position: right 15px center;
      background-size: 15px;
    }

    /* Estilo para campos obrigatórios */
    input:required, select:required, textarea:required {
      background-image: radial-gradient(circle, #ff9a9e 3px, transparent 3px);
      background-repeat: no-repeat;
      background-position: right 15px top 15px;
      background-size: 8px;
    }

    /* Responsividade */
    @media (max-width: 600px) {
      body {
        padding: 10px;
      }
      
      h1 {
        font-size: 2em;
      }
      
      form {
        padding: 25px;
      }
      
      .datetime-grid {
        grid-template-columns: 1fr;
        gap: 10px;
      }
      
      .button-group {
        flex-direction: column;
      }
      
      button {
        width: 100%;
      }
    }

    /* Animações suaves */
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    form {
      animation: fadeIn 0.6s ease-out;
    }

    /* Estilo para o campo de telefone com máscara visual */
    input[type="tel"] {
      font-family: monospace;
      letter-spacing: 1px;
    }

    /* Indicador visual de campo preenchido */
    input:not(:placeholder-shown):valid,
    select:valid,
    textarea:not(:placeholder-shown):valid {
      border-color: #ff9a9e;
      background-color: #fff5f5;
    }

    /* Mensagem de ajuda sutil */
    .help-text {
      font-size: 12px;
      color: #ff9a9e;
      margin-top: 5px;
      display: block;
    }

    /* Adicionando ícones visuais */
    label::before {
      content: '✧';
      margin-right: 5px;
      color: #ff9a9e;
      font-size: 14px;
    }

    /* Estilo adicional para o título com ícone */
    h1::before, h1::after {
      content: '✧';
      margin: 0 15px;
      color: #fff;
      font-size: 0.8em;
      opacity: 0.8;
    }

    /* Scrollbar personalizada */
    ::-webkit-scrollbar {
      width: 10px;
    }

    ::-webkit-scrollbar-track {
      background: #ffd1d1;
    }

    ::-webkit-scrollbar-thumb {
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      border-radius: 5px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: linear-gradient(135deg, #fad0c4, #ff9a9e);
    }
  </style>
</head>
<body>

  <h1>✧ Agenda do Cabeleireiro ✧</h1>

  <form action="#" method="post">

    <p>
      <label for="nome">Nome do cliente</label>
      <input type="text" id="nome" name="nome" placeholder="Digite o nome completo" required>
      <span class="help-text">Nome completo sem abreviações</span>
    </p>

    <p>
      <label for="telefone">Telefone / WhatsApp</label>
      <input type="tel" id="telefone" name="telefone" placeholder="(11) 99999-9999" required>
      <span class="help-text">Inclua o DDD</span>
    </p>

    <p>
      <label for="servico">Serviço</label>
      <select id="servico" name="servico" required>
        <option value="" disabled selected>Selecione um serviço</option>
        <option value="corte">✂️ Corte de cabelo</option>
        <option value="escova">💨 Escova</option>
        <option value="quimica">🧪 Química (progressiva, luzes etc.)</option>
        <option value="barba">🧔 Barba</option>
        <option value="outro">✨ Outro</option>
      </select>
    </p>

    <p>
      <label for="profissional">Profissional</label>
      <input type="text" id="profissional" name="profissional" placeholder="Nome do cabeleireiro">
      <span class="help-text">Deixe em branco para escolha automática</span>
    </p>

    <div class="datetime-grid">
      <p>
        <label for="data">Data</label>
        <input type="date" id="data" name="data" required>
      </p>

      <p>
        <label for="hora">Hora</label>
        <input type="time" id="hora" name="hora" required>
      </p>
    </div>

    <p>
      <label for="obs">Observações</label>
      <textarea id="obs" name="obs" rows="4" placeholder="Ex.: tipo de cabelo, preferências, alergias..."></textarea>
      <span class="help-text">Informações importantes para o atendimento</span>
    </p>

    <div class="button-group">
      <button type="submit">✓ Cadastrar Agendamento</button>
      <button type="reset">↺ Limpar</button>
    </div>

  </form>

  <!-- Script para validação e melhor experiência -->
  <script>
    // Adiciona máscara simples para telefone
    document.getElementById('telefone').addEventListener('input', function(e) {
      let value = e.target.value.replace(/\D/g, '');
      if (value.length > 11) value = value.slice(0, 11);
      
      if (value.length > 10) {
        value = value.replace(/^(\d{2})(\d{5})(\d{4})/, '($1) $2-$3');
      } else if (value.length > 5) {
        value = value.replace(/^(\d{2})(\d{4})(\d{0,4})/, '($1) $2-$3');
      } else if (value.length > 2) {
        value = value.replace(/^(\d{2})(\d{0,5})/, '($1) $2');
      } else if (value.length > 0) {
        value = value.replace(/^(\d*)/, '($1');
      }
      
      e.target.value = value;
    });

    // Define data mínima como hoje
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('data').min = today;

    // Animação adicional para o formulário
    const form = document.querySelector('form');
    form.addEventListener('mouseenter', function() {
      this.style.transition = 'all 0.3s ease';
    });
  </script>

</body>
</html>;
