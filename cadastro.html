<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Divine Studio - Cadastro de Conta</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;500;600&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --salmão-principal: #FF8C69;
            --salmão-claro: #FFA07A;
            --salmão-escuro: #E67352;
            --salmão-suave: #FFD9CC;
            --salmão-fundo: #FFF8F6;
            --dourado: #D4A16A;
            --texto-escuro: #665;
            --texto-claro: #AA8;
            --branco: #FFFFFF;
            --sombra: rgba(255, 140, 105, 0.15);
        }

        body {
            font-family: 'Raleway', sans-serif;
            background: linear-gradient(135deg, var(--salmão-fundo) 0%, #FFEFEB 100%);
            color: var(--texto-escuro);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Elementos decorativos */
        .decorative-bg {
            position: fixed;
            z-index: 0;
            opacity: 0.05;
            color: var(--salmão-principal);
            pointer-events: none;
        }

        .decor-1 {
            top: 10%;
            left: 5%;
            font-size: 6rem;
            transform: rotate(15deg);
        }

        .decor-2 {
            bottom: 15%;
            right: 5%;
            font-size: 8rem;
            transform: rotate(-20deg);
        }

        .decor-3 {
            top: 30%;
            right: 10%;
            font-size: 4rem;
            transform: rotate(45deg);
        }

        .register-container {
            background: var(--branco);
            border-radius: 30px;
            box-shadow: 0 20px 40px var(--sombra);
            padding: 40px 35px;
            max-width: 500px;
            width: 100%;
            border: 1px solid var(--salmão-suave);
            position: relative;
            z-index: 1;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            font-family: 'Great Vibes', cursive;
            font-size: 3.2rem;
            background: linear-gradient(to right, var(--salmão-principal), var(--salmão-claro));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-align: center;
            margin-bottom: 5px;
        }

        .slogan {
            font-family: 'Playfair Display', serif;
            color: var(--dourado);
            text-align: center;
            font-size: 1rem;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }

        h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            color: var(--texto-escuro);
            text-align: center;
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--texto-escuro);
            font-size: 0.95rem;
        }

        label i {
            color: var(--salmão-principal);
            margin-right: 5px;
        }

        input {
            width: 100%;
            padding: 14px 18px;
            border: 1px solid var(--salmão-suave);
            border-radius: 12px;
            font-size: 1rem;
            font-family: 'Raleway', sans-serif;
            background: var(--salmão-fundo);
            transition: all 0.3s;
            color: var(--texto-escuro);
        }

        input:focus {
            outline: none;
            border-color: var(--salmão-principal);
            box-shadow: 0 0 0 3px rgba(255, 140, 105, 0.15);
            background: var(--branco);
        }

        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 25px;
            flex-wrap: wrap;
        }

        .btn {
            flex: 1;
            padding: 16px 20px;
            border-radius: 12px;
            border: none;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Raleway', sans-serif;
            text-align: center;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--salmão-principal), var(--salmão-claro));
            color: var(--branco);
            box-shadow: 0 5px 15px var(--sombra);
        }

        .btn-secondary {
            background: var(--salmão-fundo);
            color: var(--salmão-escuro);
            border: 1px solid var(--salmão-suave);
        }

        .btn-primary:hover, .btn-secondary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(255, 140, 105, 0.25);
        }

        .login-link {
            text-align: center;
            margin-top: 30px;
            color: var(--texto-claro);
        }

        .login-link a {
            color: var(--salmão-principal);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }

        .login-link a:hover {
            color: var(--salmão-escuro);
            text-decoration: underline;
        }

        /* Responsividade */
        @media (max-width: 480px) {
            .register-container {
                padding: 30px 20px;
            }
            .logo {
                font-size: 2.5rem;
            }
            h2 {
                font-size: 1.5rem;
            }
            .btn-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <!-- Elementos decorativos -->
    <div class="decorative-bg decor-1"><i class="fas fa-feather-alt"></i></div>
    <div class="decorative-bg decor-2"><i class="fas fa-spa"></i></div>
    <div class="decorative-bg decor-3"><i class="fas fa-cut"></i></div>

    <div class="register-container">
        <div class="logo">Divine Studio</div>
        <div class="slogan">Beleza & Elegância</div>

        <h2>Criar sua conta</h2>

        <form id="registerForm">
            <div class="form-group">
                <label><i class="fas fa-user"></i> Nome completo</label>
                <input type="text" id="nome" placeholder="Seu nome completo" required>
            </div>

            <div class="form-group">
                <label><i class="fas fa-envelope"></i> E-mail</label>
                <input type="email" id="email" placeholder="seu@email.com" required>
            </div>

            <div class="form-group">
                <label><i class="fas fa-phone-alt"></i> Telefone (opcional)</label>
                <input type="tel" id="telefone" placeholder="(11) 99999-9999">
            </div>

            <div class="form-group">
                <label><i class="fas fa-lock"></i> Senha</label>
                <input type="password" id="senha" placeholder="Crie uma senha" required>
            </div>

            <div class="form-group">
                <label><i class="fas fa-lock"></i> Confirmar senha</label>
                <input type="password" id="confirmar" placeholder="Digite a senha novamente" required>
            </div>

            <div class="btn-group">
                <button type="submit" class="btn btn-primary"><i class="fas fa-check"></i> Cadastrar</button>
                <button type="reset" class="btn btn-secondary"><i class="fas fa-undo-alt"></i> Limpar</button>
            </div>
        </form>

        <div class="login-link">
            Já possui uma conta? <a href="index.html">Faça login</a>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const nome = document.getElementById('nome').value.trim();
            const email = document.getElementById('email').value.trim();
            const senha = document.getElementById('senha').value;
            const confirmar = document.getElementById('confirmar').value;

            if (!nome || !email || !senha || !confirmar) {
                alert('Por favor, preencha todos os campos obrigatórios.');
                return;
            }

            if (senha !== confirmar) {
                alert('As senhas não coincidem.');
                return;
            }

            // Simulação de cadastro bem-sucedido
            alert('Conta criada com sucesso! Redirecionando para o login.');
            // Aqui você poderia enviar os dados para um backend via fetch

            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
